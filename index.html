<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabañas del Bosque | San Ramón, CR</title>
    
    <!-- SEO y Meta Tags -->
    <meta name="description" content="Tu escape perfecto en las montañas de San Ramón. Reserva ahora en Cabañas del Bosque.">
    <link rel="icon" type="image/png" href="logo.png">

    <!-- Fonts: Caveat (Handwritten como el logo) y Montserrat (Limpia) -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome para Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-dark: #0a0a0a;
            --accent-gold: #d4a373; 
            --airbnb-red: #FF5A5F;
            --whatsapp-green: #25D366;
            --white: #ffffff;
            --glass: rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--primary-dark);
            font-family: 'Montserrat', sans-serif;
            color: var(--white);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Fondo Dinámico */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.85)), 
                        url('frontalnoche.png'); /* Foto principal */
            background-size: cover;
            background-position: center;
            z-index: -1;
            transform: scale(1.05);
            animation: slowZoom 30s infinite alternate ease-in-out;
        }

        @keyframes slowZoom {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .main-container {
            max-width: 450px;
            margin: 0 auto;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Logo Premium */
        .logo-wrapper {
            width: 135px;
            height: 135px;
            background: white; 
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            padding: 8px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .logo-wrapper img {
            width: 90%;
            height: auto;
            border-radius: 50%;
        }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: 3.8rem;
            line-height: 0.9;
            margin-bottom: 10px;
            text-shadow: 2px 4px 15px rgba(0,0,0,1);
        }

        .location {
            font-size: 0.75rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent-gold);
            margin-bottom: 40px;
            font-weight: 600;
        }

        /* Botonera */
        .links-stack {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 50px;
        }

        .btn-link {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 18px 25px;
            border-radius: 16px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .btn-link i {
            position: absolute;
            left: 20px;
            font-size: 1.3rem;
        }

        .btn-link span {
            width: 100%;
            text-align: center;
        }

        /* Efectos de Hover por Red */
        .btn-link:hover {
            transform: translateY(-4px);
            background: white;
            color: black;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .btn-airbnb:hover { background: var(--airbnb-red); color: white; border-color: var(--airbnb-red); }
        .btn-whatsapp:hover { background: var(--whatsapp-green); color: white; border-color: var(--whatsapp-green); }
        .btn-email:hover { background: var(--accent-gold); color: white; border-color: var(--accent-gold); }

        /* Galería Interactiva */
        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            margin-bottom: 40px;
        }

        .gallery-item {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.1);
            z-index: 5;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        footer {
            font-size: 0.7rem;
            opacity: 0.5;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* Animaciones de Entrada */
        .fade-in {
            animation: fadeInUp 1s ease forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <main class="main-container">
        <!-- Logo -->
        <div class="logo-wrapper fade-in" style="animation-delay: 0.1s;">
            <img src="logo.png" alt="Cabañas del Bosque">
        </div>

        <h1 class="fade-in" style="animation-delay: 0.2s;">Cabañas del Bosque</h1>
        <p class="location fade-in" style="animation-delay: 0.3s;">San Ramón, Costa Rica</p>

        <div class="links-stack">
            <!-- AIRBNB -->
            <a href="https://www.airbnb.mx/rooms/1406190021059321090?unique_share_id=81f4e1b1-ce68-4575-96b8-5659994cabbd&viralityEntryPoint=1&s=76" class="btn-link btn-airbnb fade-in" style="animation-delay: 0.4s;" target="_blank">
                <i class="fab fa-airbnb"></i>
                <span>Reserva en Airbnb</span>
            </a>

            <!-- WHATSAPP -->
            <a href="https://wa.me/message/5WRPOGGAHCIPI1" class="btn-link btn-whatsapp fade-in" style="animation-delay: 0.5s;" target="_blank">
                <i class="fab fa-whatsapp"></i>
                <span>Mensaje por WhatsApp</span>
            </a>

            <!-- INSTAGRAM -->
            <a href="https://www.instagram.com/cabanas_del_bosque_sr?igsh=MWdsN3ExY3U2dHV6cw==" class="btn-link fade-in" style="animation-delay: 0.6s;" target="_blank">
                <i class="fab fa-instagram"></i>
                <span>Síguenos en Instagram</span>
            </a>

            <!-- FACEBOOK -->
            <a href="https://www.facebook.com/share/18jzFhWi6W/" class="btn-link fade-in" style="animation-delay: 0.7s;" target="_blank">
                <i class="fab fa-facebook-f"></i>
                <span>Visítanos en Facebook</span>
            </a>

            <!-- CORREO ELECTRÓNICO -->
            <!-- Cambia 'tu-correo@gmail.com' por el correo real del cliente -->
            <a href="mailto:info@cabanasdelbosque.com" class="btn-link btn-email fade-in" style="animation-delay: 0.8s;">
                <i class="far fa-envelope"></i>
                <span>Enviar un Correo</span>
            </a>
        </div>

        <!-- Galería para antojar -->
        <p class="section-title fade-in" style="animation-delay: 0.9s;">Conoce el refugio</p>
        <div class="gallery-grid fade-in" style="animation-delay: 1s;">
            <div class="gallery-item" style="background-image: url('interior.png');"></div>
            <div class="gallery-item" style="background-image: url('hamaca.png');"></div>
            <div class="gallery-item" style="background-image: url('cocina.png');"></div>
        </div>

        <footer class="fade-in" style="animation-delay: 1.1s;">
            <p>&copy; 2024 CABAÑAS DEL BOSQUE. ALL RIGHTS RESERVED.</p>
        </footer>
    </main>

</body>
</html>
