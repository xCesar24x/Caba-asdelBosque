<!DOCTYPE html>
<html lang="es">
<head>
    <!-- 
        PROYECTO: Cabañas del Bosque - Hub de Redes Sociales
        VERSION: 3.5.0 (Final Global Top Edition)
        LOCALIZACIÓN: Angeles Norte, San Ramón, CR.
        STACK: HTML5, CSS3 (Glassmorphism), JS (Ken Burns Engine)
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cabañas del Bosque | San Ramón, Costa Rica</title>
    
    <!-- Meta Tags -->
    <meta name="description" content="Tu escape perfecto en las montañas de San Ramón. Confort y naturaleza.">
    <link rel="icon" type="image/png" href="Logo.png">

    <!-- Fonts: Caveat & Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-dark: #0a0a0a;
            --accent-gold: #d4a373; 
            --airbnb-red: #FF5A5F;
            --whatsapp-green: #25D366;
            --waze-blue: #33CCFF;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --anim-speed: 0.6s;
        }

        /* Reset Total & Layout Centering */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--primary-dark);
            font-family: 'Montserrat', sans-serif;
            color: var(--white);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centrado Horizontal */
            justify-content: flex-start;
        }

        /* Fondo Animado Permanente */
        .hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.9)), url('frontalnoche.png');
            background-size: cover; background-position: center; z-index: -1;
            filter: brightness(0.8);
        }

        /* Main Container */
        .main-container {
            width: 100%;
            max-width: 460px;
            padding: 60px 25px;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centrado perfecto de hijos */
            text-align: center;
        }

        /* Logo con Glow y Centrado Perfecto */
        .logo-wrapper {
            width: 140px; height: 140px;
            background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(255,255,255,0.15);
            border: 3px solid rgba(255,255,255,0.2);
            animation: fadeInDown 1s ease-out forwards;
        }
        .logo-wrapper img { width: 92%; height: auto; border-radius: 50%; }

        /* Typography */
        h1 {
            font-family: 'Caveat', cursive; font-size: 4rem;
            line-height: 0.9; margin-bottom: 12px;
            text-shadow: 3px 6px 20px rgba(0,0,0,0.8);
        }

        .location {
            font-size: 0.8rem; letter-spacing: 5px; text-transform: uppercase;
            color: var(--accent-gold); margin-bottom: 45px; font-weight: 600;
        }

        /* Hub de Botones con Animación Staggered */
        .links-stack { width: 100%; display: flex; flex-direction: column; gap: 18px; margin-bottom: 60px; }

        .btn-link {
            background: var(--glass);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 18px 25px; border-radius: 20px;
            text-decoration: none; color: white; font-weight: 600; font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; transform: translateY(30px);
            animation: fadeInUp 0.8s ease forwards;
        }

        /* Delays para efecto cascada espectacular */
        .btn-link:nth-child(1) { animation-delay: 0.3s; }
        .btn-link:nth-child(2) { animation-delay: 0.4s; }
        .btn-link:nth-child(3) { animation-delay: 0.5s; }
        .btn-link:nth-child(4) { animation-delay: 0.6s; }
        .btn-link:nth-child(5) { animation-delay: 0.7s; }
        .btn-link:nth-child(6) { animation-delay: 0.8s; }

        .btn-link i { position: absolute; left: 25px; font-size: 1.4rem; }

        /* Efecto Shine (Brillo) al pasar el mouse */
        .btn-link::after {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.6s;
        }
        .btn-link:hover::after { left: 100%; }

        .btn-link:hover {
            transform: translateY(-5px) scale(1.02);
            background: white; color: black;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        /* Hover Colors por Plataforma */
        .btn-airbnb:hover { background: var(--airbnb-red); color: white; border-color: var(--airbnb-red); }
        .btn-whatsapp:hover { background: var(--whatsapp-green); color: white; border-color: var(--whatsapp-green); }
        .btn-waze:hover { background: var(--waze-blue); color: white; border-color: var(--waze-blue); }
        .btn-email:hover { background: var(--accent-gold); color: white; border-color: var(--accent-gold); }

        /* Slider Section: Cinematic */
        .slider-section { width: 100%; margin-top: 10px; position: relative; }
        .section-title { font-size: 1rem; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 5px; color: var(--accent-gold); font-weight: 700; }
        
        .slider-container {
            width: 100%; height: 340px; border-radius: 30px;
            overflow: hidden; position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.15);
        }

        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; transition: opacity 1.5s ease-in-out;
            background-size: cover; background-position: center;
        }
        .slide.active { opacity: 1; animation: kenBurnsEffect 10s infinite alternate ease-in-out; }

        @keyframes kenBurnsEffect {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        /* Overlay Gradiente Slider */
        .slider-overlay {
            position: absolute; bottom: 0; width: 100%; height: 40%;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            z-index: 2;
        }

        /* Caption Sincronizado */
        .caption-box {
            margin-top: 25px; height: 30px;
            display: flex; align-items: center; justify-content: center;
        }
        .caption-text {
            font-size: 1rem; font-style: italic; font-weight: 400;
            color: rgba(255,255,255,0.9); opacity: 0;
            transition: opacity 0.8s ease;
        }

        /* Footer */
        footer {
            margin-top: 80px; width: 100%;
            padding: 30px 0 50px 0; border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.75rem; opacity: 0.4; letter-spacing: 2px;
            text-transform: uppercase; line-height: 1.8;
        }

        /* Animations Keyframes */
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-40px); } to { opacity: 1; transform: translateY(0); } }

        /* Media Queries para Pantallas Pequeñas */
        @media (max-width: 370px) {
            h1 { font-size: 3.2rem; }
            .slider-container { height: 280px; }
            .logo-wrapper { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>

    <!-- Layer de Fondo Estático/Animado -->
    <div class="hero-bg"></div>

    <main class="main-container">
        
        <!-- Header con Logo y Ubicación -->
        <header class="logo-section">
            <div class="logo-wrapper">
                <img src="Logo.png" alt="Cabañas del Bosque">
            </div>
            <h1>Cabañas del Bosque</h1>
            <p class="location">Angeles Norte, San Ramón, CR</p>
        </header>

        <!-- Navegación Hub -->
        <nav class="links-stack">
            
            <a href="https://www.airbnb.mx/rooms/1406190021059321090" class="btn-link btn-airbnb" target="_blank">
                <i class="fab fa-airbnb"></i>
                <span>Reserva en Airbnb</span>
            </a>

            <a href="https://wa.me/message/5WRPOGGAHCIPI1" class="btn-link btn-whatsapp" target="_blank">
                <i class="fab fa-whatsapp"></i>
                <span>Mensaje por WhatsApp</span>
            </a>

            <a href="https://waze.com/ul/hd1g8v0m2v" class="btn-link btn-waze" target="_blank">
                <i class="fab fa-waze"></i>
                <span>¿Cómo llegar con Waze?</span>
            </a>

            <a href="https://www.instagram.com/cabanas_del_bosque_sr" class="btn-link" target="_blank">
                <i class="fab fa-instagram"></i>
                <span>Momentos en Instagram</span>
            </a>

            <a href="https://www.facebook.com/share/18jzFhWi6W/" class="btn-link" target="_blank">
                <i class="fab fa-facebook-f"></i>
                <span>Comunidad Facebook</span>
            </a>

            <a href="mailto:Cabanasdelbosque7@gmail.com" class="btn-link btn-email">
                <i class="far fa-envelope"></i>
                <span>Consultas por Correo</span>
            </a>

        </nav>

        <!-- Slider de Experiencia -->
        <section class="slider-section">
            <h2 class="section-title">Conocé la cabaña</h2>
            
            <div class="slider-container" id="main-gallery">
                <div class="slider-overlay"></div>
            </div>

            <div class="caption-box">
                <p class="caption-text" id="caption-target"></p>
            </div>
        </section>

        <!-- Footer -->
        <footer>
            <p>&copy; 2026 CABAÑAS DEL BOSQUE.</p>
            <p>Angeles Norte, San Ramón de Alajuela, Costa Rica.</p>
        </footer>

    </main>

    <!-- JS: Gallery Engine -->
    <script>
        /**
         * Listado de contenido para el Slider
         * Asegurar que los nombres coinciden con el repo
         */
        const galleryItems = [
            { file: 'frontaldia.png', label: 'Vistas espectaculares de día' },
            { file: 'interior.png', label: 'Un refugio acogedor y moderno' },
            { file: 'cocina.png', label: 'Cocina totalmente equipada' },
            { file: 'baño.png', label: 'Espacios diseñados para tu confort' },
            { file: 'hamaca.png', label: 'El rincón perfecto para relajarse' },
            { file: 'lateraldia.png', label: 'Rodeado de naturaleza pura' },
            { file: 'lateralnoche.png', label: 'Mágicas noches bajo las estrellas' },
            { file: 'exterior.png', label: 'Tu escape privado en la montaña' },
            { file: 'decoracion.png', label: 'Detalles que hacen la diferencia' },
            { file: 'decoracion2.png', label: 'Calidez en cada rincón' },
            { file: 'porton.png', label: 'Privacidad y seguridad garantizada' }
        ];

        const container = document.getElementById('main-gallery');
        const captionTarget = document.getElementById('caption-target');

        // Generar Slides
        galleryItems.forEach((item, index) => {
            const slide = document.createElement('div');
            slide.classList.add('slide');
            if (index === 0) slide.classList.add('active');
            slide.style.backgroundImage = `url('${item.file}')`;
            container.appendChild(slide);
        });

        // Lógica de Rotación Sincronizada
        let currentIdx = 0;
        const slides = document.querySelectorAll('.slide');

        function nextSlide() {
            // Fade Out
            slides[currentIdx].classList.remove('active');
            captionTarget.style.opacity = '0';

            setTimeout(() => {
                // Siguiente Foto
                currentIdx = (currentIdx + 1) % slides.length;
                slides[currentIdx].classList.add('active');
                
                // Fade In Caption
                captionTarget.innerText = galleryItems[currentIdx].label;
                captionTarget.style.opacity = '1';
            }, 900);
        }

        // Inicializar
        captionTarget.innerText = galleryItems[0].label;
        captionTarget.style.opacity = '1';

        // Intervalo de 4.8 segundos
        setInterval(nextSlide, 4800);
    </script>

</body>
</html>
