<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabañas del Bosque | Reserva Tu Escapada</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-dark: #0a0a0a;
            --accent-gold: #e2b04a; /* Un tono dorado sutil para elegancia */
            --white: #ffffff;
            --glass: rgba(0, 0, 0, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--primary-dark);
            font-family: 'Montserrat', sans-serif;
            color: var(--white);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Hero Background con Overlay */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                        url('frontalnoche.png'); /* Usamos la foto top */
            background-size: cover;
            background-position: center;
            z-index: -1;
            transform: scale(1.1);
            animation: slowZoom 20s infinite alternate;
        }

        @keyframes slowZoom {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .main-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Logo Estilo Premium */
        .logo-wrapper {
            width: 140px;
            height: 140px;
            background: white; /* El logo es negro, así que fondo blanco circular */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 3px solid rgba(255,255,255,0.2);
        }

        .logo-wrapper img {
            width: 85%;
            height: auto;
        }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: 3.2rem;
            margin-bottom: 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .location {
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent-gold);
            margin-bottom: 35px;
            font-weight: 600;
        }

        /* Botones de Redes */
        .links-stack {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 40px;
        }

        .btn-link {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 18px 25px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            display: flex;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-link i {
            font-size: 1.4rem;
            width: 30px;
            margin-right: 15px;
        }

        .btn-link:hover {
            background: white;
            color: black;
            transform: translateY(-3px);
        }

        /* Airbnb especial */
        .btn-airbnb:hover {
            background: #FF5A5F;
            color: white;
            border-color: #FF5A5F;
        }

        /* WhatsApp especial */
        .btn-whatsapp:hover {
            background: #25D366;
            color: white;
            border-color: #25D366;
        }

        /* Galería Rápida (El toque de Director Creativo) */
        .mini-gallery-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 15px;
            opacity: 0.7;
            letter-spacing: 1px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
        }

        .gallery-item {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s;
        }

        .gallery-item:hover {
            transform: scale(1.05);
            z-index: 2;
        }

        footer {
            margin-top: auto;
            padding-top: 40px;
            font-size: 0.7rem;
            opacity: 0.5;
            text-align: center;
        }

        /* Animaciones de entrada */
        .fade-up {
            animation: fadeUp 0.8s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <main class="main-container">
        <!-- Logo (Poné el nombre exacto de tu archivo de logo) -->
        <div class="logo-wrapper fade-up" style="animation-delay: 0.1s;">
            <img src="logo.png" alt="Cabañas del Bosque">
        </div>

        <h1 class="fade-up" style="animation-delay: 0.2s;">Cabañas del Bosque</h1>
        <p class="location fade-up" style="animation-delay: 0.3s;">San José, Costa Rica</p>

        <div class="links-stack">
            <!-- Link Principal -->
            <a href="LINK_DE_AIRBNB" class="btn-link btn-airbnb fade-up" style="animation-delay: 0.4s;" target="_blank">
                <i class="fab fa-airbnb"></i>
                <span>Reservar en Airbnb</span>
            </a>

            <a href="https://wa.me/TU_NUMERO" class="btn-link btn-whatsapp fade-up" style="animation-delay: 0.5s;" target="_blank">
                <i class="fab fa-whatsapp"></i>
                <span>Consultas por WhatsApp</span>
            </a>

            <a href="LINK_INSTAGRAM" class="btn-link fade-up" style="animation-delay: 0.6s;" target="_blank">
                <i class="fab fa-instagram"></i>
                <span>Momentos en Instagram</span>
            </a>

            <a href="LINK_FACEBOOK" class="btn-link fade-up" style="animation-delay: 0.7s;" target="_blank">
                <i class="fab fa-facebook-f"></i>
                <span>Comunidad Facebook</span>
            </a>
        </div>

        <!-- Mini Galería para antojar al cliente -->
        <p class="mini-gallery-title fade-up" style="animation-delay: 0.8s;">Explora el lugar</p>
        <div class="gallery-grid fade-up" style="animation-delay: 0.9s;">
            <div class="gallery-item" style="background-image: url('interior.png');"></div>
            <div class="gallery-item" style="background-image: url('hamaca.png');"></div>
            <div class="gallery-item" style="background-image: url('cocina.png');"></div>
        </div>

        <footer class="fade-up" style="animation-delay: 1s;">
            <p>&copy; 2024 Cabañas del Bosque. Todos los derechos reservados.</p>
        </footer>
    </main>

</body>
</html>
