    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 
           VARIABLES DE DISEÑO (Design Tokens)
           Centralizamos colores para consistencia de marca.
        */
        :root {
            --primary-dark: #0a0a0a;
            --accent-gold: #d4a373; 
            --airbnb-red: #FF5A5F;
            --whatsapp-green: #25D366;
            --waze-blue: #33CCFF;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --transition-smooth: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* RESET GLOBAL */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--primary-dark);
            font-family: 'Montserrat', sans-serif;
            color: var(--white);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        /* FONDO HERO */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.9)), 
                        url('frontalnoche.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: brightness(0.8);
        }

        /* CONTENEDOR DE LA PÁGINA */
        .main-container {
            width: 100%;
            max-width: 480px;
            padding: 60px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* LOGO */
        .logo-wrapper {
            width: 140px;
            height: 140px;
            background: white; 
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.9);
            padding: 10px;
            border: 2px solid rgba(255,255,255,0.2);
            transition: var(--transition-smooth);
        }

        .logo-wrapper img {
            width: 95%;
            height: auto;
            border-radius: 50%;
        }

        /* TÍTULOS */
        h1 {
            font-family: 'Caveat', cursive;
            font-size: 4rem;
            line-height: 0.85;
            margin-bottom: 12px;
            text-shadow: 3px 6px 18px rgba(0,0,0,1);
            font-weight: 700;
        }

        .location {
            font-size: 0.8rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent-gold);
            margin-bottom: 45px;
            font-weight: 600;
            opacity: 0.9;
        }

        /* STACK DE BOTONES */
        .links-stack {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 60px;
        }

        .btn-link {
            background: var(--glass-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--glass-border);
            padding: 20px 30px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .btn-link i {
            position: absolute;
            left: 25px;
            font-size: 1.5rem;
        }

        .btn-link:hover {
            transform: translateY(-5px) scale(1.02);
            background: white;
            color: black;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .btn-airbnb:hover { background: var(--airbnb-red); color: white; border-color: var(--airbnb-red); }
        .btn-whatsapp:hover { background: var(--whatsapp-green); color: white; border-color: var(--whatsapp-green); }
        .btn-waze:hover { background: var(--waze-blue); color: white; border-color: var(--waze-blue); }
        .btn-email:hover { background: var(--accent-gold); color: white; border-color: var(--accent-gold); }

        /* SLIDER */
        .slider-section {
            width: 100%;
            margin-top: 10px;
            position: relative;
        }

        .section-title {
            font-size: 0.95rem;
            text-transform: uppercase;
            margin-bottom: 25px;
            letter-spacing: 5px;
            color: var(--accent-gold);
            font-weight: 700;
        }

        .slider-container {
            width: 100%;
            height: 340px;
            border-radius: 30px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.12);
        }

        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            transition: opacity 1.8s ease-in-out;
            background-size: cover;
            background-position: center;
        }

        .slide.active {
            opacity: 1;
            animation: kenBurnsEffect 12s infinite alternate ease-in-out;
        }

        @keyframes kenBurnsEffect {
            from { transform: scale(1); }
            to { transform: scale(1.25); }
        }

        .slider-overlay {
            position: absolute;
            bottom: 0; width: 100%; height: 50%;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            z-index: 2;
        }

        .description-box {
            margin-top: 22px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide-text {
            font-size: 1rem;
            font-weight: 400;
            font-style: italic;
            color: rgba(255,255,255,0.9);
            opacity: 0;
            transition: opacity 0.8s ease;
            letter-spacing: 0.8px;
        }

        /* FOOTER */
        footer {
            margin-top: 80px;
            font-size: 0.75rem;
            opacity: 0.4;
            letter-spacing: 2px;
            line-height: 2;
            text-transform: uppercase;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 30px;
            width: 100%;
        }

        /* ANIMACIONES */
        .fade-in-up {
            animation: fadeInUpAnimation 1.2s ease forwards;
            opacity: 0;
        }

        @keyframes fadeInUpAnimation {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 370px) {
            h1 { font-size: 3.2rem; }
            .slider-container { height: 280px; }
        }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <main class="main-container">
        
        <!-- CABECERA -->
        <header class="fade-in-up" style="animation-delay: 0.2s;">
            <div class="logo-wrapper">
                <img src="Logo.png" alt="Logo Cabañas del Bosque">
            </div>
            <h1>Cabañas del Bosque</h1>
            <p class="location">Angeles Norte, San Ramón, CR</p>
        </header>

        <!-- ENLACES -->
        <nav class="links-stack">
            
            <a href="https://www.airbnb.mx/rooms/1406190021059321090" class="btn-link btn-airbnb fade-in-up" style="animation-delay: 0.4s;" target="_blank">
                <i class="fab fa-airbnb"></i>
                <span>Reserva en Airbnb</span>
            </a>

            <a href="https://wa.me/message/5WRPOGGAHCIPI1" class="btn-link btn-whatsapp fade-in-up" style="animation-delay: 0.5s;" target="_blank">
                <i class="fab fa-whatsapp"></i>
                <span>Mensaje por WhatsApp</span>
            </a>

            <a href="https://waze.com/ul/hd1g8v0m2v" class="btn-link btn-waze fade-in-up" style="animation-delay: 0.6s;" target="_blank">
                <i class="fab fa-waze"></i>
                <span>¿Cómo llegar con Waze?</span>
            </a>

            <a href="https://www.instagram.com/cabanas_del_bosque_sr" class="btn-link fade-in-up" style="animation-delay: 0.7s;" target="_blank">
                <i class="fab fa-instagram"></i>
                <span>Momentos en Instagram</span>
            </a>

            <a href="https://www.facebook.com/share/18jzFhWi6W/" class="btn-link fade-in-up" style="animation-delay: 0.8s;" target="_blank">
                <i class="fab fa-facebook-f"></i>
                <span>Comunidad Facebook</span>
            </a>

            <a href="mailto:Cabanasdelbosque7@gmail.com" class="btn-link btn-email fade-in-up" style="animation-delay: 0.9s;">
                <i class="far fa-envelope"></i>
                <span>Consultas por Correo</span>
            </a>

        </nav>

        <!-- SLIDER -->
        <section class="slider-section fade-in-up" style="animation-delay: 1.1s;">
            <h2 class="section-title">Conocé la cabaña</h2>
            
            <div class="slider-container" id="main-gallery">
                <div class="slider-overlay"></div>
            </div>

            <div class="description-box">
                <p class="slide-text" id="caption-target"></p>
            </div>
        </section>

        <!-- PIE DE PÁGINA -->
        <footer class="fade-in-up" style="animation-delay: 1.3s;">
            <p>&copy; 2026 CABAÑAS DEL BOSQUE.</p>
            <p>Angeles Norte, San Ramón de Alajuela, Costa Rica.</p>
        </footer>

    </main>

    <script>
        const galleryData = [
            { file: 'frontaldia.png', label: 'Vistas espectaculares de día' },
            { file: 'interior.png', label: 'Un refugio acogedor y moderno' },
            { file: 'cocina.png', label: 'Cocina totalmente equipada' },
            { file: 'baño.png', label: 'Espacios diseñados para tu confort' },
            { file: 'hamaca.png', label: 'El rincón perfecto para relajarse' },
            { file: 'lateraldia.png', label: 'Rodeado de naturaleza pura' },
            { file: 'lateralnoche.png', label: 'Mágicas noches bajo las estrellas' },
            { file: 'exterior.png', label: 'Tu escape privado en la montaña' },
            { file: 'decoracion.png', label: 'Detalles que hacen la diferencia' },
            { file: 'decoracion2.png', label: 'Calidez en cada rincón' },
            { file: 'porton.png', label: 'Privacidad y seguridad garantizada' }
        ];

        const container = document.getElementById('main-gallery');
        const textDisplay = document.getElementById('caption-target');

        galleryData.forEach((item, index) => {
            const slide = document.createElement('div');
            slide.classList.add('slide');
            if (index === 0) slide.classList.add('active');
            slide.style.backgroundImage = `url('${item.file}')`;
            container.appendChild(slide);
        });

        let activeIdx = 0;
        const allSlides = document.querySelectorAll('.slide');

        function transitionGallery() {
            allSlides[activeIdx].classList.remove('active');
            textDisplay.style.opacity = '0';

            setTimeout(() => {
                activeIdx = (activeIdx + 1) % allSlides.length;
                allSlides[activeIdx].classList.add('active');
                textDisplay.innerText = galleryData[activeIdx].label;
                textDisplay.style.opacity = '1';
            }, 900);
        }

        textDisplay.innerText = galleryData[0].label;
        textDisplay.style.opacity = '1';
        setInterval(transitionGallery, 4800);
    </script>

</body>
