<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabañas del Bosque | Angeles Norte, San Ramón</title>
    
    <!-- Meta Tags para SEO y Redes -->
    <meta name="description" content="Descubre la paz en Angeles Norte, San Ramón. Reserva tu estancia en Cabañas del Bosque.">
    <link rel="icon" type="image/png" href="Logo.png">

    <!-- Fonts: Caveat para estilo manual y Montserrat para elegancia moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome para Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-dark: #0a0a0a;
            --accent-gold: #d4a373; 
            --airbnb-red: #FF5A5F;
            --whatsapp-green: #25D366;
            --white: #ffffff;
            --glass: rgba(0, 0, 0, 0.6);
        }

        /* Reset y Estilos Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--primary-dark);
            font-family: 'Montserrat', sans-serif;
            color: var(--white);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Fondo Hero Estático (Primera Impresión) */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.9)), 
                        url('frontalnoche.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .main-container {
            max-width: 450px;
            margin: 0 auto;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Logo Circular Premium */
        .logo-wrapper {
            width: 130px;
            height: 130px;
            background: white; 
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            padding: 8px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .logo-wrapper img {
            width: 90%;
            height: auto;
            border-radius: 50%;
        }

        /* Títulos */
        h1 {
            font-family: 'Caveat', cursive;
            font-size: 3.8rem;
            line-height: 0.9;
            margin-bottom: 10px;
            text-shadow: 2px 4px 15px rgba(0,0,0,1);
        }

        .location {
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-gold);
            margin-bottom: 35px;
            font-weight: 600;
        }

        /* Botonera de Enlaces */
        .links-stack {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 50px;
        }

        .btn-link {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 18px 25px;
            border-radius: 16px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .btn-link i {
            position: absolute;
            left: 20px;
            font-size: 1.3rem;
        }

        .btn-link:hover {
            transform: translateY(-5px);
            background: white;
            color: black;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .btn-airbnb:hover { background: var(--airbnb-red); color: white; border-color: var(--airbnb-red); }
        .btn-whatsapp:hover { background: var(--whatsapp-green); color: white; border-color: var(--whatsapp-green); }
        .btn-email:hover { background: var(--accent-gold); color: white; border-color: var(--accent-gold); }

        /* --- SLIDER CINEMATOGRÁFICO --- */
        .slider-section {
            width: 100%;
            margin-top: 20px;
            text-align: center;
        }

        .section-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 25px;
            letter-spacing: 3px;
            color: var(--accent-gold);
            font-weight: 600;
        }

        .slider-container {
            width: 100%;
            height: 320px;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            background-size: cover;
            background-position: center;
        }

        .slide.active {
            opacity: 1;
            animation: kenBurns 10s infinite alternate ease-in-out;
        }

        @keyframes kenBurns {
            from { transform: scale(1); }
            to { transform: scale(1.18); }
        }

        .slider-overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(transparent, rgba(0,0,0,0.6));
            z-index: 2;
        }

        /* Footer */
        footer {
            margin-top: 50px;
            font-size: 0.7rem;
            opacity: 0.5;
            letter-spacing: 1px;
            line-height: 1.6;
        }

        /* Animaciones de Entrada */
        .fade-in {
            animation: fadeInUp 1s ease forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <main class="main-container">
        
        <!-- Logo (Usa 'Logo.png' con L mayúscula como está en tu repo) -->
        <div class="logo-wrapper fade-in" style="animation-delay: 0.1s;">
            <img src="Logo.png" alt="Cabañas del Bosque Logo">
        </div>

        <h1 class="fade-in" style="animation-delay: 0.2s;">Cabañas del Bosque</h1>
        <p class="location fade-in" style="animation-delay: 0.3s;">Angeles Norte, San Ramón, CR</p>

        <!-- Stack de Enlaces -->
        <div class="links-stack">
            
            <a href="https://www.airbnb.mx/rooms/1406190021059321090?unique_share_id=81f4e1b1-ce68-4575-96b8-5659994cabbd&viralityEntryPoint=1&s=76" class="btn-link btn-airbnb fade-in" style="animation-delay: 0.4s;" target="_blank">
                <i class="fab fa-airbnb"></i>
                <span>Reserva en Airbnb</span>
            </a>

            <a href="https://wa.me/message/5WRPOGGAHCIPI1" class="btn-link btn-whatsapp fade-in" style="animation-delay: 0.5s;" target="_blank">
                <i class="fab fa-whatsapp"></i>
                <span>Mensaje por WhatsApp</span>
            </a>

            <a href="https://www.instagram.com/cabanas_del_bosque_sr?igsh=MWdsN3ExY3U2dHV6cw==" class="btn-link fade-in" style="animation-delay: 0.6s;" target="_blank">
                <i class="fab fa-instagram"></i>
                <span>Síguenos en Instagram</span>
            </a>

            <a href="https://www.facebook.com/share/18jzFhWi6W/" class="btn-link fade-in" style="animation-delay: 0.7s;" target="_blank">
                <i class="fab fa-facebook-f"></i>
                <span>Visítanos en Facebook</span>
            </a>

            <a href="mailto:info@cabanasdelbosque.com" class="btn-link btn-email fade-in" style="animation-delay: 0.8s;">
                <i class="far fa-envelope"></i>
                <span>Enviar un Correo</span>
            </a>

        </div>

        <!-- Sección de Slider: Conocé la cabaña -->
        <div class="slider-section fade-in" style="animation-delay: 0.9s;">
            <p class="section-title">Conocé la cabaña</p>
            <div class="slider-container" id="slider">
                <!-- Overlay elegante -->
                <div class="slider-overlay"></div>
                <!-- Los slides se generan automáticamente con JS -->
            </div>
        </div>

        <footer class="fade-in" style="animation-delay: 1.1s;">
            <p>&copy; 2026 CABAÑAS DEL BOSQUE.</p>
            <p>Angeles Norte, San Ramón de Alajuela.</p>
        </footer>

    </main>

    <!-- Lógica del Slider Cinematográfico -->
    <script>
        // Array con todas las fotos disponibles en tu repositorio
        const images = [
            'frontaldia.png',
            'interior.png',
            'cocina.png',
            'baño.png',
            'hamaca.png',
            'lateraldia.png',
            'lateralnoche.png',
            'exterior.png',
            'decoracion.png',
            'decoracion2.png',
            'porton.png'
        ];

        const sliderContainer = document.getElementById('slider');

        // Generar los divs de cada imagen
        images.forEach((imgSrc, index) => {
            const slideDiv = document.createElement('div');
            slideDiv.classList.add('slide');
            if (index === 0) slideDiv.classList.add('active');
            slideDiv.style.backgroundImage = `url('${imgSrc}')`;
            sliderContainer.appendChild(slideDiv);
        });

        // Función para rotar las imágenes
        let currentSlideIndex = 0;
        const slides = document.querySelectorAll('.slide');

        function showNextSlide() {
            slides[currentSlideIndex].classList.remove('active');
            currentSlideIndex = (currentSlideIndex + 1) % slides.length;
            slides[currentSlideIndex].classList.add('active');
        }

        // Cambio de foto cada 4 segundos (4000ms)
        setInterval(showNextSlide, 4000);
    </script>

</body>
</html>
