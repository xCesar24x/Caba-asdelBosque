<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabañas del Bosque | Angeles Norte, San Ramón</title>
    
    <!-- Meta Tags para SEO y Redes Sociales -->
    <meta name="description" content="Tu escape perfecto en las montañas de Angeles Norte, San Ramón. Reserva ahora en Cabañas del Bosque.">
    <meta property="og:title" content="Cabañas del Bosque | San Ramón">
    <meta property="og:description" content="Naturaleza, paz y confort en un solo lugar.">
    <meta property="og:image" content="frontalnoche.png">
    
    <link rel="icon" type="image/png" href="Logo.png">

    <!-- Tipografías: Caveat (Logo Style) y Montserrat (Modern Style) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome para Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-dark: #0a0a0a;
            --accent-gold: #d4a373; 
            --airbnb-red: #FF5A5F;
            --whatsapp-green: #25D366;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        /* Reset Total */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--primary-dark);
            font-family: 'Montserrat', sans-serif;
            color: var(--white);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Fondo Hero Estático con Overlay */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.9)), 
                        url('frontalnoche.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Contenedor Principal */
        .main-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 50px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Logo Premium (Círculo Blanco) */
        .logo-wrapper {
            width: 135px;
            height: 135px;
            background: white; 
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            padding: 10px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .logo-wrapper img {
            width: 95%;
            height: auto;
            border-radius: 50%;
        }

        /* Títulos */
        h1 {
            font-family: 'Caveat', cursive;
            font-size: 3.8rem;
            line-height: 0.9;
            margin-bottom: 10px;
            text-shadow: 2px 4px 15px rgba(0,0,0,1);
        }

        .location {
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-gold);
            margin-bottom: 40px;
            font-weight: 600;
        }

        /* Stack de Enlaces */
        .links-stack {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 60px;
        }

        .btn-link {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 18px 25px;
            border-radius: 18px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .btn-link i {
            position: absolute;
            left: 25px;
            font-size: 1.4rem;
        }

        /* Efectos Hover por Botón */
        .btn-link:hover {
            transform: translateY(-5px);
            background: white;
            color: black;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .btn-airbnb:hover { background: var(--airbnb-red); color: white; border-color: var(--airbnb-red); }
        .btn-whatsapp:hover { background: var(--whatsapp-green); color: white; border-color: var(--whatsapp-green); }
        .btn-email:hover { background: var(--accent-gold); color: white; border-color: var(--accent-gold); }

        /* --- SECCIÓN SLIDER CINEMATOGRÁFICO --- */
        .slider-section {
            width: 100%;
            margin-top: 10px;
            text-align: center;
        }

        .section-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 25px;
            letter-spacing: 4px;
            color: var(--accent-gold);
            font-weight: 600;
        }

        .slider-container {
            width: 100%;
            height: 320px;
            border-radius: 28px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            background-size: cover;
            background-position: center;
        }

        .slide.active {
            opacity: 1;
            animation: kenBurns 10s infinite alternate ease-in-out;
        }

        @keyframes kenBurns {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        /* Texto Descriptivo del Slider */
        .slide-description-container {
            margin-top: 20px;
            height: 30px; /* Espacio reservado para evitar saltos */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide-description {
            font-size: 0.95rem;
            font-weight: 400;
            font-style: italic;
            color: var(--white);
            opacity: 0;
            transition: opacity 0.6s ease;
            letter-spacing: 0.5px;
        }

        /* Footer */
        footer {
            margin-top: 60px;
            font-size: 0.7rem;
            opacity: 0.4;
            letter-spacing: 1px;
            line-height: 1.8;
            text-transform: uppercase;
        }

        /* Animaciones de Entrada (Fade Up) */
        .fade-in {
            animation: fadeInUp 1s ease forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Capa de Fondo Fija -->
    <div class="hero-bg"></div>

    <main class="main-container">
        
        <!-- Logo Corregido (L mayúscula según repo) -->
        <div class="logo-wrapper fade-in" style="animation-delay: 0.1s;">
            <img src="Logo.png" alt="Cabañas del Bosque Logo">
        </div>

        <h1 class="fade-in" style="animation-delay: 0.2s;">Cabañas del Bosque</h1>
        <p class="location fade-in" style="animation-delay: 0.3s;">Angeles Norte, San Ramón, CR</p>

        <!-- Bloque de Enlaces -->
        <div class="links-stack">
            
            <a href="https://www.airbnb.mx/rooms/1406190021059321090?unique_share_id=81f4e1b1-ce68-4575-96b8-5659994cabbd&viralityEntryPoint=1&s=76" class="btn-link btn-airbnb fade-in" style="animation-delay: 0.4s;" target="_blank">
                <i class="fab fa-airbnb"></i>
                <span>Reserva en Airbnb</span>
            </a>

            <a href="https://wa.me/message/5WRPOGGAHCIPI1" class="btn-link btn-whatsapp fade-in" style="animation-delay: 0.5s;" target="_blank">
                <i class="fab fa-whatsapp"></i>
                <span>Mensaje por WhatsApp</span>
            </a>

            <a href="https://www.instagram.com/cabanas_del_bosque_sr?igsh=MWdsN3ExY3U2dHV6cw==" class="btn-link fade-in" style="animation-delay: 0.6s;" target="_blank">
                <i class="fab fa-instagram"></i>
                <span>Síguenos en Instagram</span>
            </a>

            <a href="https://www.facebook.com/share/18jzFhWi6W/" class="btn-link fade-in" style="animation-delay: 0.7s;" target="_blank">
                <i class="fab fa-facebook-f"></i>
                <span>Visítanos en Facebook</span>
            </a>

            <a href="mailto:info@cabanasdelbosque.com" class="btn-link btn-email fade-in" style="animation-delay: 0.8s;">
                <i class="far fa-envelope"></i>
                <span>Enviar un Correo</span>
            </a>

        </div>

        <!-- Tour Visual: Slider con Descripciones -->
        <div class="slider-section fade-in" style="animation-delay: 0.9s;">
            <p class="section-title">Conocé la cabaña</p>
            
            <div class="slider-container" id="slider-main">
                <!-- Los slides se inyectan vía JavaScript -->
            </div>

            <div class="slide-description-container">
                <p class="slide-description" id="text-target"></p>
            </div>
        </div>

        <footer class="fade-in" style="animation-delay: 1.1s;">
            <p>&copy; 2026 CABAÑAS DEL BOSQUE.</p>
            <p>Angeles Norte, San Ramón de Alajuela, Costa Rica.</p>
        </footer>

    </main>

    <!-- Lógica del Slider y Sincronización de Textos -->
    <script>
        // Configuración de Imágenes y Descripciones
        const galleryContent = [
            { img: 'frontaldia.png', desc: 'Vistas espectaculares de día' },
            { img: 'interior.png', desc: 'Un refugio acogedor y moderno' },
            { img: 'cocina.png', desc: 'Cocina totalmente equipada' },
            { img: 'baño.png', desc: 'Espacios diseñados para tu confort' },
            { img: 'hamaca.png', desc: 'El rincón perfecto para relajarse' },
            { img: 'lateraldia.png', desc: 'Rodeado de naturaleza pura' },
            { img: 'lateralnoche.png', desc: 'Mágicas noches bajo las estrellas' },
            { img: 'exterior.png', desc: 'Tu escape privado en la montaña' },
            { img: 'decoracion.png', desc: 'Detalles que hacen la diferencia' },
            { img: 'decoracion2.png', desc: 'Calidez en cada rincón' },
            { img: 'porton.png', desc: 'Privacidad y seguridad garantizada' }
        ];

        const sliderEl = document.getElementById('slider-main');
        const textEl = document.getElementById('text-target');

        // 1. Generar Slides dinámicamente
        galleryContent.forEach((item, index) => {
            const div = document.createElement('div');
            div.classList.add('slide');
            if (index === 0) div.classList.add('active');
            div.style.backgroundImage = `url('${item.img}')`;
            sliderEl.appendChild(div);
        });

        // 2. Lógica de Transición
        let currentIndex = 0;
        const allSlides = document.querySelectorAll('.slide');

        function changeSlide() {
            // Fase 1: Quitar active y ocultar texto
            allSlides[currentIndex].classList.remove('active');
            textEl.style.opacity = '0';

            setTimeout(() => {
                // Fase 2: Incrementar índice
                currentIndex = (currentIndex + 1) % allSlides.length;

                // Fase 3: Activar nuevo slide y actualizar texto
                allSlides[currentIndex].classList.add('active');
                textEl.innerText = galleryContent[currentIndex].desc;
                textEl.style.opacity = '1';
            }, 800); // Sincronizado con el desvanecimiento
        }

        // Inicializar primer texto
        textEl.innerText = galleryContent[0].desc;
        textEl.style.opacity = '1';

        // Intervalo de cambio (4.5 segundos)
        setInterval(changeSlide, 4500);
    </script>

</body>
</html>
